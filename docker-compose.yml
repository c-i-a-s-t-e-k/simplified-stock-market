services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: stockmarket
      POSTGRES_USER: stockuser
      POSTGRES_PASSWORD: stockpass
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stockuser -d stockmarket"]
      interval: 5s
      timeout: 5s
      retries: 10
volumes:
  pgdata: